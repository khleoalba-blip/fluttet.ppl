name: contador_ppl_dashboard
description: Dashboard para el bot de WhatsApp ContadorPPL - Gestión de lotería
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # UI
  cupertino_icons: ^1.0.6
  
  # HTTP
  http: ^1.1.0
  
  # State Management
  provider: ^6.1.1
  
  # Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0
  
  # Formatting
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "icons/android/ic_launcher.png"
  adaptive_icon_background: "#1A237E"
  adaptive_icon_foreground: "icons/android/ic_launcher.png"

flutter:
  uses-material-design: true
